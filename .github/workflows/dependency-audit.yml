name: Anchor Dependency Audit (pip-audit)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit -r requirements.txt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 resolved 2026-06-07

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 resolved 2026-06-07
        with:
          python-version: "3.11"

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          git rev-parse --short=12 HEAD

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip_audit --version

      - name: Run pip-audit against requirements.txt
        run: |
          python -m pip_audit -r requirements.txt
