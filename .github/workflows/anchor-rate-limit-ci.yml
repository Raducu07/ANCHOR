name: Anchor Rate Limit CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: {}

jobs:
  rate-limit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RATE_LIMIT_ENABLED: "1"
      RATE_LIMIT_SECRET: "ci-test-secret"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 resolved 2026-06-07

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 resolved 2026-06-07
        with:
          python-version: "3.11"

      - name: Show workspace
        run: |
          pwd
          ls -la
          ls -la app || true
          python -c "import os, sys; print('cwd=', os.getcwd()); print('PYTHONPATH=', os.getenv('PYTHONPATH')); print(sys.path)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run deterministic rate-limit tests
        run: |
          pytest -q tests/test_rate_limit.py